name: PerformRelease

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version segment to increment.
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: Public release notes.
        required: false
        default: Automated release.

permissions:
  contents: write

jobs:
  release:
    name: Increment version and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Increment release version
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path
          import os
          import re
          import subprocess

          version_path = Path("VERSION.txt")
          current = version_path.read_text(encoding="utf-8").strip() if version_path.exists() else "0.1.0"
          match = re.fullmatch(r"([0-9]+)[.]([0-9]+)[.]([0-9]+)", current)
          if not match:
              raise SystemExit(f"Unsupported release version: {current}")

          major, minor, patch = (int(part) for part in match.groups())
          bump = os.environ["BUMP"]
          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          elif bump == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported bump value: {bump}")

          while True:
              version = f"{major}.{minor}.{patch}"
              release = f"v{version}"
              tag_exists = subprocess.run(
                  ["git", "rev-parse", "-q", "--verify", f"refs/tags/{release}"],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              ).returncode == 0
              if not tag_exists:
                  break
              patch += 1

          version_path.write_text(version + "\n", encoding="utf-8")

          for cargo_path in [
              Path("rust/crates/main/Cargo.toml"),
              Path("rust/crates/hot_reload/Cargo.toml"),
              Path("rust/crates/mcp_server/Cargo.toml"),
          ]:
              text = cargo_path.read_text(encoding="utf-8")
              text = re.sub(r'(?m)^version = "[^"]+"', f'version = "{version}"', text, count=1)
              cargo_path.write_text(text, encoding="utf-8")

          with Path("release.env").open("w", encoding="utf-8") as env:
              env.write(f"VERSION={version}\n")
              env.write(f"RELEASE_VERSION={release}\n")
          PY

          cat release.env >> "${GITHUB_ENV}"

      - name: Update Cargo lockfile
        shell: bash
        run: |
          set -euo pipefail
          cargo check --workspace

      - name: Commit release version
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add VERSION.txt Cargo.lock rust/crates/main/Cargo.toml rust/crates/hot_reload/Cargo.toml rust/crates/mcp_server/Cargo.toml
          git commit -m "Release ${RELEASE_VERSION}"
          git tag "${RELEASE_VERSION}"
          git push origin HEAD
          git push origin "${RELEASE_VERSION}"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail

          gh release create "${RELEASE_VERSION}" \
            --title "${RELEASE_VERSION}" \
            --notes "${RELEASE_NOTES}"
